{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">File Upload</h1>

{% include 'flash_messages.html' %}

<form method="POST" enctype="multipart/form-data">
    {{ form.hidden_tag() }}

    <div>
        {{ form.photo.label }}
        {{ form.photo() }}
        
    </div>

    <div>
        <button type="submit">Upload</button>
    </div>
</form>

{% endblock %}
