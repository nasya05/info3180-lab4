{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div class="image-grid">
    {% for image in images %}
    <div class="image-item">
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
        <p>{{ image }}</p>
    </div>
    {% endfor %}
</div>

<style>
/* Grid container */
.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* auto adjust columns */
    gap: 20px;
}

/* Individual image items */
.image-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.image-item img {
    width: 100%; /* fill the grid cell */
    height: auto;
    border-radius: 8px; /* optional rounded corners */
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
</style>
{% endblock %}
